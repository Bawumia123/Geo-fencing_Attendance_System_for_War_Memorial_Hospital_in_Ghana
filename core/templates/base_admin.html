<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — War Memorial Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; }
        .sidebar-link { display:flex; align-items:center; gap:0.75rem; padding:0.5rem 0.75rem; border-radius:0.5rem; font-size:0.875rem; color:#9ca3af; transition:all 0.15s; }
        .sidebar-link:hover { background:rgba(255,255,255,0.08); color:#fff; }
        .sidebar-link.active { background:rgba(59,130,246,0.15); color:#60a5fa; }
        .stat-card { background:#161b22; border:1px solid #21262d; }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:#161b22; }
        ::-webkit-scrollbar-thumb { background:#30363d; border-radius:2px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-48 flex-shrink-0 flex flex-col border-r border-white/10" style="background:#111827;">
        <div class="px-4 py-5 border-b border-white/10">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                    </svg>
                </div>
                <div class="min-w-0">
                    <p class="text-white font-bold text-xs leading-tight">War Memorial</p>
                    <p class="text-blue-400 text-xs">Hospital</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
            <p class="text-gray-600 text-xs uppercase tracking-wider px-3 py-2 font-medium">Main</p>
            <a href="{% url 'dashboard' %}" class="sidebar-link {% block nav_dashboard %}{% endblock %}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Dashboard
            </a>
            <a href="{% url 'attendance' %}" class="sidebar-link {% block nav_attendance %}{% endblock %}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                Attendance
            </a>

            <p class="text-gray-600 text-xs uppercase tracking-wider px-3 py-2 font-medium mt-2">Management</p>
            <a href="{% url 'staff_list' %}" class="sidebar-link {% block nav_staff %}{% endblock %}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-5-3.87M9 20H4v-2a4 4 0 015-3.87m6-4.13a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                Staff
            </a>
            <a href="{% url 'create_staff' %}" class="sidebar-link {% block nav_create_staff %}{% endblock %}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                Add Staff
            </a>
        </nav>

        <div class="px-3 py-4 border-t border-white/10">
            <div class="flex items-center gap-2 mb-3">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
                    {{ user.first_name|first|default:user.username|first|upper }}
                </div>
                <div class="min-w-0">
                    <p class="text-white text-xs font-semibold truncate">{{ user.get_full_name|default:user.username }}</p>
                    <p class="text-blue-400 text-xs">Admin</p>
                </div>
            </div>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="w-full flex items-center gap-2 text-xs text-gray-500 hover:text-red-400 transition px-1 py-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Sign out
                </button>
            </form>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        {% block content %}{% endblock %}
    </div>

    <!-- Notification Dropdown (global, outside sidebar) -->
    <div id="notif-panel"
         class="hidden fixed top-0 right-0 h-full w-80 z-50 flex flex-col shadow-2xl"
         style="background:#161b22; border-left:1px solid #21262d;">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/10">
            <h3 class="text-white font-semibold text-sm">Notifications</h3>
            <div class="flex items-center gap-3">
                <button id="mark-all-read" class="text-xs text-blue-400 hover:text-blue-300 transition">Mark all read</button>
                <button id="close-notif" class="text-gray-500 hover:text-white transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <div id="notif-list" class="flex-1 overflow-y-auto px-3 py-3 space-y-2">
            <p class="text-gray-600 text-xs text-center py-8">Loading...</p>
        </div>
    </div>
    <!-- Overlay -->
    <div id="notif-overlay" class="hidden fixed inset-0 z-40" style="background:rgba(0,0,0,0.4);"></div>

    <script>
        const panel = document.getElementById('notif-panel');
        const overlay = document.getElementById('notif-overlay');
        const notifList = document.getElementById('notif-list');
        const bell = document.getElementById('notif-bell');
        const badge = document.getElementById('notif-badge');
        const markAllBtn = document.getElementById('mark-all-read');
        const closeBtn = document.getElementById('close-notif');

        const LEVEL_STYLES = {
            error:   { border: 'border-red-500/30',    bg: 'bg-red-500/10',    dot: 'bg-red-400',    text: 'text-red-300' },
            warning: { border: 'border-yellow-500/30', bg: 'bg-yellow-500/10', dot: 'bg-yellow-400', text: 'text-yellow-300' },
            success: { border: 'border-green-500/30',  bg: 'bg-green-500/10',  dot: 'bg-green-400',  text: 'text-green-300' },
            info:    { border: 'border-blue-500/30',   bg: 'bg-blue-500/10',   dot: 'bg-blue-400',   text: 'text-blue-300' },
        };

        function getCsrf() {
            return document.querySelector('[name=csrfmiddlewaretoken]') ?
                document.querySelector('[name=csrfmiddlewaretoken]').value :
                '{{ csrf_token }}';
        }

        async function loadNotifications() {
            try {
                const res = await fetch('/api/notifications/');
                const data = await res.json();

                // Update badge
                if (data.unread_count > 0) {
                    badge.textContent = data.unread_count > 9 ? '9+' : data.unread_count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }

                // Render list
                if (data.notifications.length === 0) {
                    notifList.innerHTML = '<p class="text-gray-600 text-xs text-center py-8">No new notifications</p>';
                    return;
                }

                notifList.innerHTML = data.notifications.map(n => {
                    const s = LEVEL_STYLES[n.level] || LEVEL_STYLES.info;
                    return `
                    <div class="border ${s.border} ${s.bg} rounded-lg p-3 relative" id="notif-${n.id}">
                        <div class="flex items-start justify-between gap-2">
                            <div class="flex items-center gap-2 min-w-0">
                                <span class="w-2 h-2 rounded-full ${s.dot} flex-shrink-0 mt-0.5"></span>
                                <p class="${s.text} text-xs font-semibold truncate">${n.title}</p>
                            </div>
                            <div class="flex items-center gap-2 flex-shrink-0">
                                <span class="text-gray-600 text-xs whitespace-nowrap">${n.time}</span>
                                <button onclick="dismissNotif(${n.id})"
                                    class="text-gray-600 hover:text-gray-400 transition">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                            </div>
                        </div>
                        <p class="text-gray-400 text-xs mt-1 ml-4">${n.message}</p>
                    </div>`;
                }).join('');
            } catch (e) {
                notifList.innerHTML = '<p class="text-red-400 text-xs text-center py-8">Failed to load notifications</p>';
            }
        }

        async function dismissNotif(id) {
            document.getElementById(`notif-${id}`)?.remove();
            await fetch(`/api/notifications/${id}/dismiss/`, {
                method: 'POST',
                headers: { 'X-CSRFToken': getCsrf() }
            });
            await loadNotifications();
        }

        function openPanel() {
            panel.classList.remove('hidden');
            overlay.classList.remove('hidden');
            loadNotifications();
        }

        function closePanel() {
            panel.classList.add('hidden');
            overlay.classList.add('hidden');
        }

        bell.addEventListener('click', () => {
            panel.classList.contains('hidden') ? openPanel() : closePanel();
        });

        overlay.addEventListener('click', closePanel);
        closeBtn.addEventListener('click', closePanel);

        markAllBtn.addEventListener('click', async () => {
            await fetch('/api/notifications/mark-read/', {
                method: 'POST',
                headers: { 'X-CSRFToken': getCsrf() }
            });
            await loadNotifications();
        });

        // Poll for new notifications every 30 seconds
        loadNotifications();
        setInterval(loadNotifications, 30000);
    </script>

</body>
</html>
