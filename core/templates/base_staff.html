<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Staff Portal{% endblock %} — War Memorial Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; }
        .nav-link { display:flex; align-items:center; gap:0.75rem; padding:0.5rem 0.75rem; border-radius:0.5rem; font-size:0.875rem; color:#9ca3af; transition:all 0.15s; }
        .nav-link:hover { background:rgba(255,255,255,0.08); color:#fff; }
        .nav-link.active { background:rgba(59,130,246,0.15); color:#60a5fa; }
        .stat-card { background:#161b22; border:1px solid #21262d; }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:#161b22; }
        ::-webkit-scrollbar-thumb { background:#30363d; border-radius:2px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar — staff only sees their own section -->
    <aside class="w-48 flex-shrink-0 flex flex-col border-r border-white/10" style="background:#111827;">
        <div class="px-4 py-5 border-b border-white/10">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                    </svg>
                </div>
                <div class="min-w-0">
                    <p class="text-white font-bold text-xs leading-tight">War Memorial</p>
                    <p class="text-green-400 text-xs">Staff Portal</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-3 py-4 space-y-0.5">
            <a href="{% url 'mark_attendance' %}" class="nav-link {% block nav_clockin %}{% endblock %}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Clock In
            </a>
            <a href="{% url 'my_records' %}" class="nav-link {% block nav_my_records %}{% endblock %}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                My Records
            </a>
        </nav>

        <div class="px-3 py-4 border-t border-white/10">
            <div class="flex items-center gap-2 mb-3">
                <div class="w-8 h-8 rounded-full bg-green-700 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
                    {{ user.first_name|first|default:user.username|first|upper }}
                </div>
                <div class="min-w-0">
                    <p class="text-white text-xs font-semibold truncate">{{ user.get_full_name|default:user.username }}</p>
                    <p class="text-gray-500 text-xs truncate">{{ user.profile.get_department_display|default:"Staff" }}</p>
                </div>
            </div>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="w-full flex items-center gap-2 text-xs text-gray-500 hover:text-red-400 transition px-1 py-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Sign out
                </button>
            </form>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
